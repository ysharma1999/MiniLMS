<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Course Content</title>
  <style>
    :root {
      --primary: #6366F1;
      --primary-light: #818CF8;
      --bg: #0F172A;
      --card: #1E293B;
      --border: #334155;
      --text: #F8FAFC;
      --muted: #94A3B8;
      --accent: #10B981;
      --amber: #F59E0B;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    .hero {
      background: linear-gradient(135deg, #312E81 0%, #1E1B4B 50%, var(--bg) 100%);
      padding: 2rem 1.5rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.15);
      filter: blur(60px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #818CF8;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 12px;
      position: relative;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--amber);
      font-weight: 700;
    }

    .content {
      padding: 1.5rem;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .description {
      color: #CBD5E1;
      font-size: 14px;
      line-height: 1.7;
    }

    .instructor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .instructor-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
    }

    .instructor-name {
      font-weight: 700;
      font-size: 15px;
    }

    .instructor-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary-light);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .curriculum-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(51, 65, 85, 0.5);
    }

    .curriculum-item:last-child {
      border-bottom: none;
    }

    .lesson-num {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(99, 102, 241, 0.15);
      color: var(--primary-light);
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .lesson-title {
      flex: 1;
      font-size: 13px;
      color: #CBD5E1;
    }

    .lesson-duration {
      font-size: 12px;
      color: var(--muted);
    }

    .price-section {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0.05) 100%);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .price-display {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }

    .price-current {
      font-size: 2rem;
      font-weight: 900;
      color: var(--text);
    }

    .price-original {
      font-size: 1rem;
      color: var(--muted);
      text-decoration: line-through;
    }

    .discount-badge {
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .enroll-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--primary) 0%, #4338CA 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .enroll-btn:active {
      opacity: 0.9;
      transform: scale(0.98);
    }

    .enroll-btn.enrolled {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
    }

    #status-msg {
      text-align: center;
      font-size: 12px;
      color: var(--accent);
      margin-top: 8px;
      min-height: 18px;
      transition: opacity 0.3s;
    }

    .thumbnail {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: #A5B4FC;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p style="color: var(--muted); font-size: 14px;">Loading course content…</p>
  </div>

  <div id="app" style="display: none;" class="fade-in">
    <!-- Hero -->
    <div class="hero">
      <div class="badge" id="category-badge">📚 Course</div>
      <h1 id="course-title">Course Title</h1>
      <div class="meta-row">
        <span class="rating">⭐ <span id="rating">0.0</span></span>
        <span class="meta-item">⏱️ <span id="duration">0h</span></span>
        <span class="meta-item">👥 <span id="students">0</span> students</span>
        <span class="meta-item" id="level-badge">🎯 Beginner</span>
      </div>
    </div>

    <div class="content">
      <!-- Price -->
      <div class="price-section">
        <div class="price-display">
          <span class="price-current" id="price">$0</span>
          <span class="price-original" id="original-price">$0</span>
          <span class="discount-badge" id="discount">0% OFF</span>
        </div>
        <button class="enroll-btn" id="enroll-btn" onclick="handleEnroll()">
          Enroll Now
        </button>
        <p id="status-msg"></p>
      </div>

      <!-- Thumbnail -->
      <img id="thumbnail" class="thumbnail" src="" alt="Course thumbnail" onerror="this.style.display='none'" />

      <!-- Description -->
      <div class="section">
        <p class="section-title">About This Course</p>
        <p class="description" id="description">Loading...</p>
        <div class="tags" id="tags"></div>
      </div>

      <!-- Instructor -->
      <div class="section">
        <p class="section-title">Instructor</p>
        <div class="instructor">
          <img class="instructor-avatar" id="instructor-avatar" src="" alt="Instructor"
            onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=fallback'" />
          <div>
            <p class="instructor-name" id="instructor-name">Instructor</p>
            <p class="instructor-meta" id="instructor-meta">Location</p>
            <p class="instructor-meta" id="instructor-email">Email</p>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="section">
        <p class="section-title">Course Stats</p>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="stat-lessons">0</div>
            <div class="stat-label">Lessons</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-duration">0h</div>
            <div class="stat-label">Duration</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-rating">0.0</div>
            <div class="stat-label">Rating</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-level">–</div>
            <div class="stat-label">Level</div>
          </div>
        </div>
      </div>

      <!-- Curriculum -->
      <div class="section">
        <p class="section-title">Curriculum Preview</p>
        <div id="curriculum"></div>
      </div>
    </div>
  </div>

  <script>
    let courseData = null;
    let isEnrolled = false;

    // Listen for messages from the native app
    window.addEventListener('message', handleMessage);
    document.addEventListener('message', handleMessage);

    function handleMessage(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'COURSE_DATA') {
          courseData = data.payload;
          isEnrolled = data.payload.isEnrolled || false;
          renderCourse(data.payload);
          // Signal ready back
          sendToNative({ type: 'READY', payload: { courseId: data.payload.id } });
        }
      } catch (e) {
        console.error('Message parse error:', e);
      }
    }

    function sendToNative(msg) {
      try {
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify(msg));
        }
      } catch (e) { }
    }

    function renderCourse(data) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      document.getElementById('course-title').textContent = data.title || 'Untitled Course';
      document.getElementById('category-badge').textContent = '📚 ' + (data.category || 'Course');
      document.getElementById('rating').textContent = (data.rating || 0).toFixed(1);
      document.getElementById('duration').textContent = data.duration || 'N/A';
      document.getElementById('students').textContent = (data.studentsEnrolled || 0).toLocaleString();
      document.getElementById('level-badge').textContent = '🎯 ' + (data.level || 'Beginner');
      document.getElementById('price').textContent = '$' + (data.price || 0).toFixed(2);
      document.getElementById('original-price').textContent = '$' + (data.originalPrice || 0).toFixed(2);

      const discount = data.originalPrice > 0
        ? Math.round((1 - data.price / data.originalPrice) * 100)
        : 0;
      document.getElementById('discount').textContent = discount + '% OFF';

      document.getElementById('description').textContent = data.description || '';
      document.getElementById('thumbnail').src = data.thumbnail || '';

      // Instructor
      if (data.instructor) {
        const i = data.instructor;
        document.getElementById('instructor-avatar').src = i.picture?.large || '';
        document.getElementById('instructor-name').textContent = `${i.name?.title || ''} ${i.name?.first || ''} ${i.name?.last || ''}`.trim();
        document.getElementById('instructor-meta').textContent = `${i.location?.city || ''}, ${i.location?.country || ''}`;
        document.getElementById('instructor-email').textContent = i.email || '';
      }

      // Stats
      document.getElementById('stat-lessons').textContent = data.lessonsCount || 0;
      document.getElementById('stat-duration').textContent = data.duration || 'N/A';
      document.getElementById('stat-rating').textContent = (data.rating || 0).toFixed(1);
      document.getElementById('stat-level').textContent = data.level || '–';

      // Tags
      const tagsEl = document.getElementById('tags');
      const tags = [data.category, data.brand, data.level].filter(Boolean);
      tagsEl.innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');

      // Curriculum
      const curriculumEl = document.getElementById('curriculum');
      const lessonTopics = generateLessonTopics(data);
      curriculumEl.innerHTML = lessonTopics.map((topic, i) =>
        `<div class="curriculum-item">
        <div class="lesson-num">${i + 1}</div>
        <div class="lesson-title">${topic}</div>
        <div class="lesson-duration">${Math.floor(Math.random() * 20 + 5)}min</div>
      </div>`
      ).join('');

      // Enroll button
      updateEnrollButton();
    }

    function generateLessonTopics(data) {
      const base = [
        'Introduction & Overview',
        'Core Fundamentals',
        'Practical Application',
        'Hands-on Project',
        'Advanced Techniques',
        'Best Practices',
        'Real-world Examples',
        'Q&A and Review',
      ];
      return base.slice(0, Math.min(data.lessonsCount || 8, base.length));
    }

    function updateEnrollButton() {
      const btn = document.getElementById('enroll-btn');
      if (isEnrolled) {
        btn.textContent = '✅ Enrolled — Continue Learning';
        btn.classList.add('enrolled');
      } else {
        btn.textContent = 'Enroll Now';
        btn.classList.remove('enrolled');
      }
    }

    function handleEnroll() {
      if (isEnrolled) {
        sendToNative({ type: 'NAVIGATION', payload: { action: 'continue_learning', courseId: courseData?.id } });
        return;
      }

      isEnrolled = true;
      updateEnrollButton();
      document.getElementById('status-msg').textContent = '🎉 Successfully enrolled!';
      setTimeout(() => {
        document.getElementById('status-msg').textContent = '';
      }, 3000);

      sendToNative({
        type: 'TRACK_PROGRESS',
        payload: { action: 'enroll', courseId: courseData?.id, courseTitle: courseData?.title }
      });
    }

    // Auto-timeout: if no message received in 5s, show an error
    setTimeout(() => {
      if (!courseData) {
        document.getElementById('loading').innerHTML = `
        <p style="color: #F43F5E; font-size: 14px;">⚠️ Content failed to load.</p>
        <button onclick="sendToNative({ type: 'CLOSE', payload: {} })"
          style="margin-top: 12px; background: #6366F1; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; cursor: pointer;">
          Go Back
        </button>`;
      }
    }, 5000);
  </script>
</body>

</html>
