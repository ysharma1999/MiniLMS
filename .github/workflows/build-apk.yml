name: Build & Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js 24 (fixes deprecation warning)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          # cache removed — was causing "Cache service 400" error

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Setup Expo & EAS
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # 5. Build APK using EAS (runs on Expo cloud, not here)
      - name: Build APK
        id: build
        run: |
          BUILD_ID=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            | jq -r '.id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build ID: $BUILD_ID"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 6. Wait for build to finish and get APK URL
      - name: Wait for build and get APK URL
        id: get_apk
        run: |
          echo "Waiting for EAS build to complete..."
          for i in $(seq 1 30); do
            STATUS=$(eas build:view ${{ steps.build.outputs.build_id }} --json | jq -r '.status')
            echo "Attempt $i — Status: $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then
              APK_URL=$(eas build:view ${{ steps.build.outputs.build_id }} --json | jq -r '.artifacts.buildUrl')
              echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
              echo "APK URL: $APK_URL"
              break
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            echo "Waiting 60 seconds..."
            sleep 60
          done
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 7. Download APK
      - name: Download APK
        run: |
          curl -L -o app-release.apk "${{ steps.get_apk.outputs.apk_url }}"
          echo "APK size: $(du -sh app-release.apk)"

      # 8. Create GitHub Release and upload APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MiniLMS ${{ github.ref_name }}"
          body: |
            ## 📱 MiniLMS ${{ github.ref_name }}

            ### Features
            - ✅ Login & Registration
            - ✅ Course Catalog with Search
            - ✅ Bookmarks with Notifications
            - ✅ WebView Course Content
            - ✅ Offline Mode Detection
            - ✅ Profile with Avatar Upload

            ### Install on Android
            1. Download `app-release.apk` below
            2. On your phone: **Settings → Security → Unknown Sources → Enable**
            3. Open the downloaded APK and install

            > Built with Expo SDK + EAS Build
          files: app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}